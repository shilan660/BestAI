spring:
  application:
    name: Best AI
  profiles:
    active: local


  datasource:
    url: jdbc:postgresql://rm-cn-xxa4rn4380001euo.rwlb.rds.aliyuncs.com:5432/Best_AI
    username: my_user

  ai:
    dashscope:
      chat:
        options:
          model: "qwen-plus"
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch

server:
  port : 8123
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.best.agent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug